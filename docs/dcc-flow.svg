<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1240" viewBox="0 0 820 1240" font-family="'Noto Sans Thai','Sarabun','Leelawadee UI',sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fae5f"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15803d"/><stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b4690e"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f766e" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="820" height="1240" fill="#eef6f0"/>

  <!-- header -->
  <rect x="0" y="0" width="820" height="78" fill="url(#bar)"/>
  <text x="32" y="34" fill="#ffffff" font-size="23" font-weight="700">ระบบควบคุมเอกสาร (DCC) — Flow การใช้งาน</text>
  <text x="32" y="60" fill="#d7efe4" font-size="14">อ้างอิงระเบียบปฏิบัติ QP-DC-01 · DAR (FM-MR-01) · Master List (FM-MR-02)</text>

  <!-- roles legend -->
  <text x="32" y="108" fill="#1f2a26" font-size="13" font-weight="700">บทบาท:</text>
  <g font-size="12.5">
    <rect x="92" y="95" width="150" height="22" rx="11" fill="#e4f5ec" stroke="#159a57"/>
    <text x="167" y="110" fill="#15803d" text-anchor="middle">ผู้จัดทำ (Owner)</text>
    <rect x="252" y="95" width="190" height="22" rx="11" fill="#e4f5ec" stroke="#159a57"/>
    <text x="347" y="110" fill="#15803d" text-anchor="middle">ผู้ทบทวน (หัวหน้าแผนก/MR)</text>
    <rect x="452" y="95" width="150" height="22" rx="11" fill="#e4f5ec" stroke="#159a57"/>
    <text x="527" y="110" fill="#15803d" text-anchor="middle">ผู้อนุมัติ (MD)</text>
    <rect x="612" y="95" width="176" height="22" rx="11" fill="#fff5e6" stroke="#b4690e"/>
    <text x="700" y="110" fill="#b4690e" text-anchor="middle">DCC (เจ้าหน้าที่คุมเอกสาร)</text>
  </g>

  <!-- ===== step boxes (center column x 250..610) ===== -->
  <!-- 1 -->
  <g filter="url(#sh)">
    <rect x="250" y="150" width="360" height="78" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="250" y="150" width="6" height="78" rx="3" fill="url(#grad)"/>
  </g>
  <circle cx="288" cy="178" r="15" fill="url(#grad)"/>
  <text x="288" y="184" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="316" y="178" fill="#1f2a26" font-size="16" font-weight="700">สร้างคำร้อง (DAR)</text>
  <text x="316" y="199" fill="#5b6660" font-size="12.5">เมนู “สร้างคำร้อง” · กรอกข้อมูล + แนบไฟล์ + วันคาดว่าจะเสร็จ</text>
  <text x="316" y="217" fill="#159a57" font-size="12" font-weight="600">ผู้จัดทำ → กด “ส่งคำร้อง” (Decision = PENDING)</text>

  <line x1="430" y1="228" x2="430" y2="262" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2 -->
  <g filter="url(#sh)">
    <rect x="250" y="264" width="360" height="74" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="250" y="264" width="6" height="74" rx="3" fill="url(#grad)"/>
  </g>
  <circle cx="288" cy="292" r="15" fill="url(#grad)"/>
  <text x="288" y="298" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="316" y="292" fill="#1f2a26" font-size="16" font-weight="700">แจ้งเตือนอัตโนมัติ ✉</text>
  <text x="316" y="313" fill="#5b6660" font-size="12.5">ระบบส่งอีเมลหา qa_admin@ ทันที พร้อมรายละเอียด + ลิงก์</text>
  <text x="316" y="330" fill="#159a57" font-size="12" font-weight="600">อัตโนมัติ (ไม่ต้องทำเอง)</text>

  <line x1="430" y1="338" x2="430" y2="372" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3 decision -->
  <g filter="url(#sh)">
    <rect x="250" y="374" width="360" height="84" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="250" y="374" width="6" height="84" rx="3" fill="#f59e0b"/>
  </g>
  <circle cx="288" cy="404" r="15" fill="#f59e0b"/>
  <text x="288" y="410" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="316" y="404" fill="#1f2a26" font-size="16" font-weight="700">พิจารณาคำร้อง</text>
  <text x="316" y="425" fill="#5b6660" font-size="12.5">เมนู “คำร้องทั้งหมด” → เปิดคำร้อง ใส่ผู้ตัดสิน + ความเห็น</text>
  <text x="316" y="444" fill="#b4690e" font-size="12" font-weight="600">ผู้ทบทวน (หัวหน้าแผนก/MR) → ผู้อนุมัติ (MD)</text>

  <!-- reject branch (left, loop back to 1) -->
  <path d="M250,416 L150,416 L150,189 L244,189" fill="none" stroke="#b4690e" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowR)"/>
  <rect x="92" y="404" width="92" height="24" rx="12" fill="#fdecec" stroke="#c62f2f"/>
  <text x="138" y="420" fill="#c62f2f" font-size="12" font-weight="700" text-anchor="middle">❌ ปฏิเสธ</text>
  <text x="150" y="300" fill="#c62f2f" font-size="11" text-anchor="middle" transform="rotate(-90 150 300)">ส่งกลับผู้ขอแก้ไข</text>

  <!-- approve down -->
  <line x1="430" y1="458" x2="430" y2="494" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="378" y="464" width="104" height="22" rx="11" fill="#e8f7ee" stroke="#15803d"/>
  <text x="430" y="479" fill="#15803d" font-size="12" font-weight="700" text-anchor="middle">✅ อนุมัติ</text>

  <!-- 4 -->
  <g filter="url(#sh)">
    <rect x="250" y="496" width="360" height="78" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="250" y="496" width="6" height="78" rx="3" fill="url(#grad)"/>
  </g>
  <circle cx="288" cy="524" r="15" fill="url(#grad)"/>
  <text x="288" y="530" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="316" y="524" fill="#1f2a26" font-size="16" font-weight="700">ขึ้นทะเบียน Master List</text>
  <text x="316" y="545" fill="#5b6660" font-size="12.5">เมนู “MDL” (FM-MR-02) · รหัส AA-BB-01, Rev, วันบังคับใช้</text>
  <text x="316" y="563" fill="#b4690e" font-size="12" font-weight="600">DCC → Status = Active + ตั้งวันทบทวนถัดไป</text>

  <line x1="430" y1="574" x2="430" y2="608" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5 -->
  <g filter="url(#sh)">
    <rect x="250" y="610" width="360" height="84" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="250" y="610" width="6" height="84" rx="3" fill="url(#grad)"/>
  </g>
  <circle cx="288" cy="640" r="15" fill="url(#grad)"/>
  <text x="288" y="646" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">5</text>
  <text x="316" y="640" fill="#1f2a26" font-size="16" font-weight="700">แจกจ่าย + ติดตามทบทวน</text>
  <text x="316" y="661" fill="#5b6660" font-size="12.5">เมนู “Expiry Monitor” · 🔴 เลยกำหนด 🟡 ใกล้ครบ 🟢 ปกติ</text>
  <text x="316" y="680" fill="#159a57" font-size="12" font-weight="600">ทบทวนอย่างน้อยปีละ 1 ครั้ง (ตาม QP-DC-01)</text>

  <!-- review cycle loop (right, back to 1) -->
  <path d="M610,652 L690,652 L690,189 L616,189" fill="none" stroke="#159a57" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="690" y="420" fill="#159a57" font-size="11" text-anchor="middle" transform="rotate(-90 690 420)">ถึงรอบทบทวน → ออก DAR ใหม่</text>

  <!-- dashboard note -->
  <g filter="url(#sh)">
    <rect x="150" y="745" width="520" height="62" rx="14" fill="#ffffff" stroke="#e6efe9"/>
    <rect x="150" y="745" width="6" height="62" rx="3" fill="url(#bar)"/>
  </g>
  <text x="180" y="773" fill="#1f2a26" font-size="15" font-weight="700">📊 Dashboard</text>
  <text x="180" y="794" fill="#5b6660" font-size="12.5">ภาพรวมตลอดเวลา: เอกสารทั้งหมด · รออนุมัติ · อนุมัติแล้ว · ปฏิเสธ + คำร้องล่าสุด</text>

  <!-- legend of statuses -->
  <text x="150" y="850" fill="#1f2a26" font-size="13" font-weight="700">สถานะคำร้อง:</text>
  <rect x="248" y="836" width="92" height="22" rx="11" fill="#fff5e6"/><text x="294" y="851" fill="#b4690e" font-size="12" text-anchor="middle">PENDING</text>
  <rect x="350" y="836" width="100" height="22" rx="11" fill="#e8f7ee"/><text x="400" y="851" fill="#15803d" font-size="12" text-anchor="middle">APPROVED</text>
  <rect x="460" y="836" width="96" height="22" rx="11" fill="#fdecec"/><text x="508" y="851" fill="#c62f2f" font-size="12" text-anchor="middle">REJECTED</text>

  <text x="150" y="895" fill="#9aa49d" font-size="11.5">Sorworaphat InterFoods · Document Control Center — สร้างด้วย Cloudflare Worker + D1 + R2 · แจ้งเตือนอีเมลผ่าน Google Apps Script</text>
</svg>
